# Spring Boot应用配置文件
# 配置数据库连接、模板引擎、服务器端口等信息
spring:
    # 数据源配置
    datasource:
        # 👇 只改了这里：blog-mysql -> localhost
        url: jdbc:mysql://localhost:3306/eleven_blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useOldAliasMetadataBehavior=true&zeroDateTimeBehavior=convertToNull&autoCommit=true&rewriteBatchedStatements=true
        # 数据库用户名
        username: root
        # 数据库密码（请修改为你的MySQL密码）
        password: pzf52013149876
        # MySQL驱动类名
        driver-class-name: com.mysql.cj.jdbc.Driver

    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 50MB

    data:
        redis:
            host: 127.0.0.1
            password: 123456
            port: 6379
            database: 1
            connect-timeout: 10000ms

    # 数据库初始化配置
    sql:
        init:
            mode: never  # 由 Docker 初始化脚本处理
            continue-on-error: false

# JWT配置
jwt:
    secret: "MySuperSecretKeyForBlogProjectThatIsVeryLongAndSecure123"
    access-token-expiration: 1800000  # 30分钟
    refresh-token-expiration: 604800000  # 7天

# 服务器配置
server:
    port: 8081
    address: 0.0.0.0

# MyBatis配置
mybatis:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: blog.pojo
    configuration:
        map-underscore-to-camel-case: true
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
    level:
        blog:
            mapper: debug
            service: info
            controller: info
        org.springframework.security: debug
        org.springframework.web: debug

# 文件上传配置
file:
    upload-dir: E:/blog-writing
    upload-path: /images/**

# Spring Boot Actuator - 健康检查
management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            show-details: when-authorized
    health:
        db:
            enabled: true

# 博客配置
blog:
    owner:
        email: 3331379576@qq.com
        nickname: 困醒
        avatar: static/images/Image_1761740285982.jpg